# ============================================
# FLUENT DESIGN SYSTEM
# Sistema de Diseño UI/UX
# ============================================

fluent_design_system:
  # ============================================
  # FLUENT DESIGN SYSTEM (Microsoft)
  # Sistema de Diseño UI/UX
  # ============================================
  
  typography:
    primary_font: "Segoe UI Variable, Segoe UI, system-ui, -apple-system, sans-serif"
    line_height: 1.5
    font_weight: 400
    características: "Fuente muy legible, escalamiento integrado al sistema, optimizada para interfaces digitales"
  
  theme: "dark"
  
  colors:
    background: "#202020"  # Mica
    text:
      primary: "#ffffff"
      secondary: "rgba(255, 255, 255, 0.7)"
    accent:
      primary: "#0078D4"  # Classic Fluent
      light: "#60CDFF"     # Windows 11 Dark Accent
      dark: "#005FB8"
    surface:
      default: "rgba(255, 255, 255, 0.05)"
      hover: "rgba(255, 255, 255, 0.08)"
      active: "rgba(255, 255, 255, 0.03)"
    border:
      default: "rgba(255, 255, 255, 0.08)"
    acrylic: "rgba(32, 32, 32, 0.7)"
    
  geometry:
    border_radius:
      button: "4px"
      input: "4px"
      card: "0.75rem"  # 12px
      scrollbar: "9999px"
      
  elevation:
    shadows:
      default: "0 4px 8px 0 rgba(0,0,0,0.2), 0 1px 2px 0 rgba(0,0,0,0.1)"
      elevated: "0 8px 16px 0 rgba(0,0,0,0.2), 0 2px 4px 0 rgba(0,0,0,0.1)"
      button: "0 1px 2px rgba(0,0,0,0.14)"
      
  motion:
    transition: "all"
    duration: "167ms"  # Aproximadamente 10 frames a 60fps
    timing_function: "cubic-bezier(0.1, 0.9, 0.2, 1)"  # Snappy pero fluido
    
  componentes:
    card:
      background: "surface.default"
      border: "1px solid border.default"
      border_radius: "geometry.border_radius.card"
      shadow: "elevation.shadows.default"
      backdrop_filter: "blur(20px)"
    button:
      primary:
        background: "accent.primary"
        color: "text.primary"
        border_radius: "geometry.border_radius.button"
      secondary:
        background: "surface.default"
        color: "text.primary"
        border_radius: "geometry.border_radius.button"
    input:
      background: "surface.hover"
      border: "1px solid border.default"
      border_radius: "geometry.border_radius.input"
      focus_border_bottom: "2px solid accent.primary"

  principios:
    luz:
      - "Sombras elevadas para profundidad"
      - "Bordes sutiles en elementos interactivos"
      - "Iluminación progresiva en hover"
    profundidad:
      - "Capas visuales diferenciadas"
      - "Efectos de elevación en cards"
      - "Z-index estratégico para overlays"
    movimiento:
      - "Transiciones fluidas (167ms)"
      - "Animaciones de entrada/salida"
      - "Micro-interacciones en botones"
    material:
      - "Texturas sutiles en fondos"
      - "Superficies con diferente elevación"
      - "Bordes redondeados consistentes (4px-12px)"
    escala:
      - "Tipografía jerárquica clara (H1-H6)"
      - "Espaciado basado en grid de 8px"
      - "Iconos proporcionales (24px, 32px, 48px)"

  implementacion:
    descripcion: "La configuración depende de tailwind.config.js para mapear tokens a clases utilitarias"
    archivos:
      - "tailwind.config.js: Mapeo de tokens"
      - "src/index.css: Componentes de nivel superior (.forensic-card, .forensic-btn, .forensic-input)"
      - "src/components/: Componentes React con estilos Fluent"

