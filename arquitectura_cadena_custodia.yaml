# =============================================================================
# SEGURIDAD Y AUDITORÍA
# =============================================================================
seguridad:
  autenticacion:
    metodo: "JWT + Refresh Tokens"
    providers: ["local", "oauth2_gobierno"]
    mfa:
      habilitado: true
      metodos: ["totp", "sms", "email"]
    session:
      timeout: 900 # 15 minutos
      renew_on_activity: true
      
  autorizacion:
    modelo: "RBAC + ABAC"
    roles:
      ADMINISTRADOR_SISTEMA:
        permisos: ["*"]
      FUNCIONARIO_ACTUANTE:
        permisos:
          - "cadena:create"
          - "cadena:read:own"
          - "evidencia:create"
          - "evidencia:update:own"
          - "planilla:generate"
          - "traslado:request"
      PERITO:
        permisos:
          - "cadena:read:assigned"
          - "evidencia:read:assigned"
          - "peritaje:create"
          - "peritaje:update:own"
          - "informe:generate"
      ADMINISTRADOR_RESGUARDO:
        permisos:
          - "evidencia:read:all"
          - "resguardo:ingreso"
          - "resguardo:egreso"
          - "resguardo:traslado"
          - "inventario:manage"
          - "ubicaciones:manage"
      FISCAL:
        permisos:
          - "cadena:read:all"
          - "evidencia:read:all"
          - "peritaje:read:all"
          - "audiencia:schedule"
          - "disposicion:solicitar"
      JUEZ:
        permisos:
          - "cadena:read:all"
          - "evidencia:read:all"
          - "disposicion:ordenar"
          - "audiencia:presidir"
      AUDITOR:
        permisos:
          - "cadena:read:all"
          - "audit:read"
          - "reportes:all"
          - "logs:export"
          
  auditoria:
    log_todo: true
    campos_auditar:
      - "todos_los_campos_críticos"
      - "firmas"
      - "cambios_de_estado"
      - "movimientos_de_evidencia"
    retencion_logs: "10_años"
    inmutabilidad: "blockchain_hash"
    
  cifrado:
    datos_en_reposo: "AES-256-GCM"
    datos_en_transito: "TLS 1.3"
    firmas_digitales: "RSA-4096 / ECDSA P-384"
    hashes: "SHA-256"

# =============================================================================
# INTEGRACIONES
# =============================================================================
integraciones:
  hardware:
    - dispositivo: "Lector de Códigos de Barras"
      protocolo: "HID"
      uso: "Registro rápido de evidencias"
      
    - dispositivo: "Impresora de Etiquetas"
      protocolo: "ESC/POS"
      uso: "Impresión de etiquetas con código de barras/QR"
      
    - dispositivo: "Cámara Fotográfica"
      protocolo: "PTP/MTP"
      uso: "Captura directa de evidencias"
      
    - dispositivo: "Lector de Huellas"
      protocolo: "BioAPI"
      uso: "Autenticación biométrica"
      
    - dispositivo: "Báscula Digital"
      protocolo: "Serial/USB"
      uso: "Pesado automático de evidencias"
      
  software:
    - sistema: "Sistema de Gestión Fiscal"
      metodo: "REST API"
      datos: ["números_de_caso", "órdenes_judiciales", "disposiciones"]
      
    - sistema: "Registro Civil"
      metodo: "SOAP"
      datos: ["validación_de_cédulas", "datos_personales"]
      
    - sistema: "PGR (Ministerio Público)"
      metodo: "Web Service"
      datos: ["actuaciones", "fiscales_asignados"]

# =============================================================================
# CONFIGURACIÓN DE BUILD Y DESPLIEGUE
# =============================================================================
build_config:
  web_pwa:
    comando: "npm run build:vercel"
    output_dir: "dist"
    optimizaciones:
      - "code_splitting"
      - "tree_shaking"
      - "image_optimization"
      - "lazy_loading"
    pwa:
      offline_support: true
      background_sync: true
      push_notifications: true
      install_prompt: true
      
  electron:
    comando: "npm run electron:build:all"
    plataformas:
      linux:
        formats: [".deb", ".rpm", ".AppImage"]
        arch: ["x64", "arm64"]
      windows:
        formats: [".exe", ".msi"]
        arch: ["x64"]
      macos:
        formats: [".dmg", ".pkg"]
        arch: ["x64", "arm64"]
    configuracion_deb:
      package_name: "cadena-custodia-ve"
      maintainer: "Sistema de Justicia Venezolano"
      section: "utils"
      priority: "optional"
      dependencies:
        - "libgtk-3-0"
        - "libnotify4"
        - "libnss3"
        - "libxss1"
        - "libxtst6"
        - "xdg-utils"
        - "libatspi2.0-0"
        - "libdrm2"
        - "libgbm1"
        
  ci_cd:
    provider: "GitHub Actions"
    triggers:
      - "push to main"
      - "release tags"
    jobs:
      - name: "test"
        steps: ["install", "lint", "test", "build"]
      - name: "build-electron"
        steps: ["build-linux", "build-windows", "build-macos"]
      - name: "deploy-vercel"
        steps: ["build-web", "deploy"]
      - name: "release"
        steps: ["create-release", "upload-artifacts"]

