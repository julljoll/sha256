  glosario:
    template: "glossary.html"
    parent: "recursos"
    metadata:
      title: "Glosario de Términos"
      description: "Diccionario de términos técnicos y legales relacionados con informática forense"
    terms:
      - term: "Adquisición Forense"
        definition: "Proceso de copiado bit a bit de un dispositivo de almacenamiento para preservar la evidencia digital original"
        category: "Técnico"
      - term: "Cadena de Custodia"
        definition: "Procedimiento documentado que registra el manejo de evidencia desde su recolección hasta su presentación en juicio"
        category: "Legal"
      - term: "Evidencia Digital"
        definition: "Información almacenada o transmitida en formato digital que tiene valor probatorio en un proceso legal"
        category: "Legal"
      - term: "Hash Criptográfico"
        definition: "Función matemática que genera un valor único para verificar la integridad de datos digitales"
        category: "Técnico"
      - term: "Imagen Forense"
        definition: "Copia exacta bit a bit de un medio de almacenamiento utilizada para análisis forense"
        category: "Técnico"
      - term: "Perito Informático"
        definition: "Experto en tecnología de la información que proporciona testimonio especializado en procesos judiciales"
        category: "Legal"
      - term: "Write Blocker"
        definition: "Dispositivo hardware o software que previene la escritura en un dispositivo durante la adquisición forense"
        category: "Técnico"
      - term: "Volatilidad de Datos"
        definition: "Característica de ciertos datos digitales que pueden perderse rápidamente si no se preservan adecuadamente"
        category: "Técnico"

# Configuración de búsqueda y SEO
search:
  enabled: true
  engine: "elasticsearch"
  indexed_fields:
    - "title"
    - "content"
    - "metadata.author"
    - "metadata.keywords"
  filters:
    - "category"
    - "year"
    - "document_type"

seo:
  default_title: "Portal de Informática Forense - Delitos Informáticos y Marco Legal"
  default_description: "Recurso integral sobre informática forense, delitos informáticos, normas ISO 27037 y 27042, y legislación venezolana"
  keywords:
    - "informática forense"
    - "delitos informáticos"
    - "evidencia digital"
    - "ISO 27037"
    - "ISO 27042"
    - "cadena de custodia"
    - "peritaje informático"
    - "ley de infogobierno"
    - "venezuela"
  open_graph:
    enabled: true
    image: "/images/og-default.jpg"
  sitemap:
    enabled: true
    changefreq: "weekly"
  robots:
    allow_all: true

# Configuración de usuarios y permisos
user_roles:
  - id: visitor
    name: "Visitante"
    permissions:
      - "view_public_content"
      - "search"
      - "download_documents"
  
  - id: registered
    name: "Usuario Registrado"
    permissions:
      - "view_public_content"
      - "search"
      - "download_documents"
      - "save_favorites"
      - "comment"
  
  - id: expert
    name: "Experto"
    permissions:
      - "view_public_content"
      - "search"
      - "download_documents"
      - "save_favorites"
      - "comment"
      - "publish_articles"
      - "edit_glossary"
  
  - id: admin
    name: "Administrador"
    permissions:
      - "all"

# API Endpoints
api:
  version: "v1"
  base_path: "/api/v1"
  endpoints:
    - path: "/documents"
      methods: ["GET", "POST"]
      description: "Listar y crear documentos"
    - path: "/documents/{id}"
      methods: ["GET", "PUT", "DELETE"]
      description: "Operaciones en documento específico"
    - path: "/search"
      methods: ["GET", "POST"]
      description: "Búsqueda de contenido"
    - path: "/categories"
      methods: ["GET"]
      description: "Listar categorías"
    - path: "/glossary"
      methods: ["GET", "POST"]
      description: "Gestión del glosario"
    - path: "/users"
      methods: ["GET", "POST"]
      description: "Gestión de usuarios"
    - path: "/auth/login"
      methods: ["POST"]
      description: "Autenticación"
    - path: "/auth/logout"
      methods: ["POST"]
      description: "Cerrar sesión"

# Tecnologías recomendadas
tech_stack:
  frontend:
    framework: "React"
    css: "Tailwind CSS"
    state_management: "Redux Toolkit"
    routing: "React Router"
  
  backend:
    framework: "Node.js con Express"
    database: "PostgreSQL"
    search_engine: "Elasticsearch"
    cache: "Redis"
  
  cms:
    option: "Strapi (Headless CMS)"
    alternative: "Contentful"
  
  deployment:
    hosting: "AWS / Vercel / Netlify"
    ci_cd: "GitHub Actions"
    containerization: "Docker"

# Analytics y monitoreo
analytics:
  google_analytics:
    enabled: true
    version: "GA4"
  matomo:
    enabled: false
  custom_events:
    - "document_download"
    - "search_query"
    - "page_view_category"
    - "glossary_term_view"

# Accesibilidad
accessibility:
  wcag_level: "AA"
  features:
    - "keyboard_navigation"
    - "screen_reader_support"
    - "high_contrast_mode"
    - "text_resizing"
    - "alt_text_images"
    - "aria_labels"
