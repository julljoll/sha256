  norma_iso_27037:
    template: "standard-detail.html"
    parent: "normas_tecnicas"
    metadata:
      standard_number: "ISO/IEC 27037:2012"
      title: "Guidelines for identification, collection, acquisition, and preservation of digital evidence"
      organization: "ISO/IEC"
      year: "2012"
      category: "Seguridad de la Información"
    sections:
      - overview:
          title: "Descripción General"
          content: "Esta norma proporciona directrices para las actividades específicas de identificación, colección, adquisición y preservación de evidencia digital"
      
      - key_principles:
          title: "Principios Clave"
          principles:
            - "Minimizar el manejo de evidencia digital original"
            - "Personal competente debe realizar todas las acciones"
            - "Auditoría completa de todo el proceso"
            - "Preservar la integridad de la evidencia"
      
      - process_flow:
          title: "Flujo del Proceso"
          steps:
            - "Identificación de evidencia digital"
            - "Colección de evidencia"
            - "Adquisición forense"
            - "Preservación y almacenamiento"
      
      - related_standards:
          title: "Normas Relacionadas"
          links:
            - "ISO/IEC 27042:2015"
            - "NIST SP 800-101"

  norma_iso_27042:
    template: "standard-detail.html"
    parent: "normas_tecnicas"
    metadata:
      standard_number: "ISO/IEC 27042:2015"
      title: "Guidelines for the analysis and interpretation of digital evidence"
      organization: "ISO/IEC"
      year: "2015"
      category: "Seguridad de la Información"
    sections:
      - overview:
          title: "Descripción General"
          content: "Directrices para el análisis e interpretación de evidencia digital en investigaciones forenses"
      
      - analysis_phases:
          title: "Fases del Análisis"
          phases:
            - "Preparación del análisis"
            - "Examen de la evidencia"
            - "Análisis de datos"
            - "Interpretación de resultados"
      
      - documentation:
          title: "Documentación Requerida"
          items:
            - "Registro de todas las acciones realizadas"
            - "Herramientas utilizadas y su validación"
            - "Resultados obtenidos"
            - "Conclusiones del análisis"

  peritaje_conceptos:
    template: "content-page.html"
    parent: "peritaje"
    metadata:
      title: "Conceptos Básicos de Peritaje Informático"
      author: "Jeimy José Cano Martínez"
      source: "El Peritaje Informático y la Evidencia Digital en Colombia"
    sections:
      - introduction:
          title: "Introducción al Peritaje Informático"
          content: |
            El peritaje informático es el proceso mediante el cual un experto en tecnología de la información 
            analiza evidencia digital para proporcionar testimonio especializado en procesos judiciales.
      
      - definitions:
          title: "Definiciones Fundamentales"
          terms:
            - term: "Perito Informático"
              definition: "Profesional con conocimientos especializados en tecnología que auxilia al juez en la comprensión de aspectos técnicos"
            - term: "Evidencia Digital"
              definition: "Información almacenada o transmitida en formato digital que puede ser utilizada en un proceso legal"
            - term: "Cadena de Custodia"
              definition: "Procedimiento documentado que garantiza la integridad de la evidencia desde su hallazgo hasta su presentación en juicio"
      
      - competencies:
          title: "Competencias del Perito"
          list:
            - "Conocimientos técnicos en informática forense"
            - "Dominio de normas ISO relacionadas"
            - "Comprensión del marco legal aplicable"
            - "Capacidad de redacción de informes técnicos"
            - "Ética profesional e imparcialidad"

  cadena_custodia_manual:
    template: "manual-page.html"
    parent: "cadena_custodia"
    metadata:
      title: "Manual Único de Cadena de Custodia de Evidencias"
      version: "Versión Final 29SEP17"
      type: "Manual Oficial"
    sections:
      - introduction:
          title: "Introducción"
          content: "Este manual establece los procedimientos estandarizados para el manejo de evidencias físicas y digitales"
      
      - procedures:
          title: "Procedimientos de Cadena de Custodia"
          steps:
            - number: 1
              name: "Identificación y recolección"
              description: "Localización y aseguramiento inicial de la evidencia"
            - number: 2
              name: "Embalaje y etiquetado"
              description: "Protección física y identificación única de la evidencia"
            - number: 3
              name: "Transporte seguro"
              description: "Traslado manteniendo las condiciones de integridad"
            - number: 4
              name: "Almacenamiento controlado"
              description: "Guardado en instalaciones seguras con acceso restringido"
            - number: 5
              name: "Transferencias documentadas"
              description: "Cada cambio de custodia debe quedar registrado"
      
      - forms:
          title: "Formatos de Registro"
          forms_list:
            - "Acta de recolección de evidencia"
            - "Cadena de custodia"
            - "Solicitud de análisis"
            - "Informe de transferencia"

  criminologia_ciencia:
    template: "article-page.html"
    parent: "criminologia"
    metadata:
      title: "La Criminología: Una Ciencia Dinámica"
      category: "Criminología"
    sections:
