fluent_design_system:
  typography:
    primary_font: "Segoe UI Variable, Segoe UI, system-ui, -apple-system, sans-serif"
    line_height: 1.5
    font_weight: 400
  
  theme: "dark"
  
  colors:
    background: "#202020"
    text:
      primary: "#ffffff"
      secondary: "rgba(255, 255, 255, 0.7)"
    accent:
      primary: "#0078D4"
      light: "#60CDFF"
      dark: "#005FB8"
    surface:
      default: "rgba(255, 255, 255, 0.05)"
      hover: "rgba(255, 255, 255, 0.08)"
      active: "rgba(255, 255, 255, 0.03)"
    border:
      default: "rgba(255, 255, 255, 0.08)"
    acrylic: "rgba(32, 32, 32, 0.7)"
    
  geometry:
    border_radius:
      button: "4px"
      input: "4px"
      card: "0.75rem" # 12px
      scrollbar: "9999px"
      
  elevation:
    shadows:
      default: "0 4px 8px 0 rgba(0,0,0,0.2), 0 1px 2px 0 rgba(0,0,0,0.1)"
      elevated: "0 8px 16px 0 rgba(0,0,0,0.2), 0 2px 4px 0 rgba(0,0,0,0.1)"
      button: "0 1px 2px rgba(0,0,0,0.14)"
      
  motion:
    transition: "all"
    duration: "167ms"
    timing_function: "cubic-bezier(0.1, 0.9, 0.2, 1)"
    
  components:
    card:
      background: "surface.default"
      border: "1px solid border.default"
      border_radius: "geometry.border_radius.card"
      shadow: "elevation.shadows.default"
      backdrop_filter: "blur(20px)"
    button:
      primary:
        background: "accent.primary"
        color: "text.primary"
        border_radius: "geometry.border_radius.button"
      secondary:
        background: "surface.default"
        color: "text.primary"
        border_radius: "geometry.border_radius.button"
    input:
      background: "surface.hover"
      border: "1px solid border.default"
      border_radius: "geometry.border_radius.input"
      focus_border_bottom: "2px solid accent.primary"
