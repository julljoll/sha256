name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for Vercel/PWA
        run: npm run build:vercel
      
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-electron-linux:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Electron .deb package
        run: npm run electron:build:deb
      
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: forense-android-linux-deb
          path: dist-electron/*.deb

  build-electron-windows:
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Electron Windows executable
        run: npm run electron:build -- --win
      
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: forense-android-windows-exe
          path: dist-electron/*.exe

  build-electron-macos:
    runs-on: macos-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Electron macOS DMG
        run: npm run electron:build -- --mac
      
      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: forense-android-macos-dmg
          path: dist-electron/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-electron-linux, build-electron-windows, build-electron-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/forense-android-linux-deb/*.deb
            artifacts/forense-android-windows-exe/*.exe
            artifacts/forense-android-macos-dmg/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
