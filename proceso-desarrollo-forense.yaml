# ============================================
# DOCUMENTACIÓN DEL PROCESO DE DESARROLLO
# Sistema Forense Android - React + Vite + Electron
# ============================================

proyecto:
  nombre: "Forense Android Electron"
  version: "1.0.0"
  descripcion: "Sistema de gestión forense para dispositivos Android con empaquetado .deb"
  tecnologias:
    frontend:
      - "React 18.2.0"
      - "TypeScript 5.3.3"
      - "Vite 5.0.8"
      - "TailwindCSS 3.4.0"
      - "React Router DOM 6.20.0"
      - "Zustand 4.4.7 (State Management)"
      - "Lucide React (Iconos)"
    desktop:
      - "Electron 28.0.0"
      - "Electron Builder 24.9.1"
    herramientas_externas:
      - "Andriller v3.6.2+ (Extracción forense)"
      - "ALEAPP v2.1.0+ (Análisis de artefactos)"

# ============================================
# ARQUITECTURA DEL SISTEMA
# ============================================

arquitectura:
  tipo: "Aplicación de Escritorio Multiplataforma"
  patron_diseno: "Componentes React con State Management Centralizado"
  
  capas:
    - nombre: "Capa de Presentación (React Components)"
      ubicacion: "/src/pages/, /src/components/"
      responsabilidad: "Interfaz de usuario con TailwindCSS"
      
    - nombre: "Capa de Estado (Zustand Store)"
      ubicacion: "/src/store/"
      responsabilidad: "Gestión del estado global de la aplicación"
      
    - nombre: "Capa de Comunicación (Electron IPC)"
      ubicacion: "/electron/main.js, /electron/preload.js"
      responsabilidad: "Comunicación segura entre renderer y main process"
      
    - nombre: "Capa de Servicios Externos"
      integraciones:
        - "Andriller: Extracción forense mediante QProcess"
        - "ALEAPP: Análisis de artefactos Android"
        - "Sistema de Archivos: Lectura/escritura segura"
        - "Cálculo de Hashes: SHA-256, MD5 para integridad"

  flujo_datos: |
    Usuario → Componente React → electronAPI (preload) → IPC → Main Process
                                                              ↓
    Usuario ← Componente React ← electronAPI (preload) ← IPC ← Herramientas Externas

# ============================================
# ESTRUCTURA DE DIRECTORIOS
# ============================================

estructura_directorios:
  raiz: "/workspace/forense-android-electron/"
  
  directorios_principales:
    - ruta: "/electron/"
      archivos:
        - "main.js: Proceso principal de Electron"
        - "preload.js: Bridge seguro entre procesos"
        
    - ruta: "/src/"
      subdirectorios:
        - "components/: Componentes reutilizables (Layout, etc.)"
        - "pages/: Páginas principales de la aplicación"
          - "HomePage.tsx: Dashboard inicial"
          - "ConsignacionPage.tsx: Registro de evidencia"
          - "AdquisicionPage.tsx: Extracción con Andriller"
          - "AnalisisPage.tsx: Procesamiento con ALEAPP"
          - "InformePage.tsx: Generación de dictamen"
        - "store/: Estado global con Zustand"
        - "services/: Servicios y utilidades"
        - "hooks/: Custom hooks de React"
        - "types/: Definiciones TypeScript"
        - "utils/: Funciones auxiliares"
      archivos_base:
        - "App.tsx: Componente raíz con routing"
        - "main.tsx: Punto de entrada de React"
        - "index.css: Estilos globales con Tailwind"
        
    - ruta: "/public/"
      proposito: "Recursos estáticos (iconos, assets)"
      
    - ruta: "/dist/"
      proposito: "Build de producción de Vite"
      
    - ruta: "/dist-electron/"
      proposito: "Paquetes .deb generados"

  archivos_configuracion:
    - "package.json: Dependencias y scripts"
    - "vite.config.ts: Configuración de Vite"
    - "tsconfig.json: Configuración de TypeScript"
    - "tailwind.config.js: Personalización de Tailwind"
    - "postcss.config.js: Configuración de PostCSS"
    - "index.html: HTML base"

# ============================================
# PROCESO DE CONSIGNACIÓN DE TELÉFONOS
# ============================================

proceso_consignacion:
  fase: "FASE I - Obtención por Consignación"
  definicion: "Recepción voluntaria de dispositivo móvil por parte del propietario/poseedor"
  
  pasos:
    - orden: 1
      nombre: "Verificación de Identidad"
      acciones:
        - "Solicitar cédula de identidad de quien consigna"
        - "Registrar nombre completo y datos de contacto"
        - "Documentar relación con el caso"
      interfaz: "ConsignacionPage.tsx - Paso 1: Datos del Caso"
      
    - orden: 2
      nombre: "Documentación del Motivo"
      acciones:
        - "Registrar motivo de la consignación"
        - "Asignar número de caso único"
        - "Identificar fiscal asignado"
      campos_requeridos:
        - "numeroCaso: Ej: MP-2024-001234"
        - "fiscal: Nombre del fiscal"
        - "fechaInicio: Fecha actual"
        - "expedienteNumero: Número de expediente"
        
    - orden: 3
      nombre: "Fijación del Dispositivo"
      acciones:
        - "Fotografiar dispositivo desde todos los ángulos"
        - "Documentar IMEI, IMEI2 (marcar *#06#)"
        - "Registrar estado físico (golpes, rayones)"
        - "Verificar estado de pantalla (encendido/apagado)"
        - "Documentar estado de batería"
      campos_requeridos:
        - "marca: Samsung, Xiaomi, Huawei, etc."
        - "modelo: Modelo específico"
        - "imei: 15 dígitos"
        - "imei2: 15 dígitos (si es dual SIM)"
        - "numeroTel: Número de línea"
        - "simCard: Número de serie SIM"
        - "estadoFisico: Descripción de daños"
        - "pantallaEstado: encendido/apagado"
        - "bateriaEstado: Porcentaje o estado"
        - "modoAislamiento: modo_avion/bolsa_faraday"
        
    - orden: 4
      nombre: "Generación de PRCC"
      acciones:
        - "Crear Planilla de Registro de Cadena de Custodia"
        - "Asignar número único de PRCC"
        - "Documentar funcionario colector"
        - "Especificar tipo de embalaje"
        - "Registrar número de precinto"
        - "Calcular hash inicial (si aplica)"
      campos_requeridos:
        - "numeroPRCC: Ej: PRCC-2024-001234"
        - "tipo: principal/derivada"
        - "funcionarioColector: Nombre completo"
        - "cargo: Cargo del funcionario"
        - "organo: CICPC, PNB, MP, etc."
        - "tipoEmbalaje: bolsa/caja/sobre/otro"
        - "numeroPrecinto: Código del precinto"
        - "estadoEmbalaje: buenas/deterioradas/rotas"
        - "nombreFirmante: Quien entrega la evidencia"
        - "hashSHA256: Hash calculado"
        - "hashMD5: Hash calculado"
        
    - orden: 5
      nombre: "Almacenamiento de Datos"
      acciones:
        - "Guardar toda la información en Zustand store"
        - "Persistir en base de datos (implementación futura)"
        - "Generar acta de consignación en PDF"
      salida: "Datos disponibles para fases siguientes"

# ============================================
# PROCESO DE ADQUISICIÓN CON ANDRILLER
# ============================================

proceso_adquisicion:
  fase: "FASE II - Adquisición Forense"
  herramienta: "Andriller v3.6.2+"
  definicion: "Extracción lógica/física del dispositivo en modo solo lectura"
  
  configuracion_andriller:
    comando_base: "andriller --output <ruta_salida> --mode <tipo> --readonly"
    modos_extraccion:
      - tipo: "logica"
        descripcion: "Extracción de datos accesibles sin root"
        recomendacion: "Método recomendado para mayoría de casos"
        
      - tipo: "fisica"
        descripcion: "Extracción bit-a-bit completa"
        requerimiento: "Root o bootloader desbloqueado"
    
    argumentos:
      - "--output: Directorio de salida"
      - "--mode: Tipo de extracción (logica/fisica)"
      - "--readonly: Modo solo lectura (integridad forense)"
      - "--device: ID del dispositivo (opcional)"
  
  implementacion_electron:
    archivo: "/electron/main.js"
    ipc_handler: "andriller:start"
    codigo_clave: |
      ipcMain.handle('andriller:start', async (event, config) => {
        const { outputPath, extractionType = 'logica', deviceId } = config;
        const args = ['--output', outputPath, '--mode', extractionType, '--readonly'];
        if (deviceId) args.push('--device', deviceId);
        const process = spawn('andriller', args);
        // Manejo de stdout, stderr, y eventos
      });
    
    preload_api: "/electron/preload.js"
    api_expuesta: |
      window.electronAPI.andriller.start(config)
      window.electronAPI.andriller.cancel()
      window.electronAPI.andriller.onOutput(callback)
      window.electronAPI.andriller.onError(callback)
  
  interfaz_usuario:
    pagina: "AdquisicionPage.tsx"
    componentes:
      - "Selector de directorio de salida"
      - "Selector de tipo de extracción"
      - "Campo opcional para device ID"
      - "Botón Iniciar/Cancelar extracción"
      - "Barra de progreso en tiempo real"
      - "Log de ejecución en vivo"
      
  flujo_trabajo:
    - "Usuario selecciona carpeta de salida"
    - "Usuario configura tipo de extracción"
    - "Sistema invoca Andriller vía IPC"
    - "Proceso se ejecuta asíncronamente"
    - "Output se muestra en tiempo real"
    - "Al finalizar, se guarda registro en store"
    - "Se calculan hashes de verificación"
    
  validacion_integridad:
    - "Calcular SHA-256 de imagen original"
    - "Calcular SHA-256 de copia obtenida"
    - "Comparar hashes para verificar integridad"
    - "Documentar valores en PRCC/adquisiciones"

# ============================================
# PROCESO DE ANÁLISIS CON ALEAPP
# ============================================

proceso_analisis:
  fase: "FASE III - Peritaje y Análisis"
  herramienta: "ALEAPP v2.1.0+"
  definicion: "Android Logs Events And Protobuf Parser"
  
  configuracion_aleapp:
    comando_base: "aleapp -i <imagen> -o <salida> -t fs"
    tipos_analisis:
      - tipo: "completo"
        descripcion: "Todos los artefactos disponibles"
        uso: "Análisis exhaustivo del dispositivo"
        
      - tipo: "whatsapp"
        descripcion: "Solo artefactos de WhatsApp"
        argumento: "--filter whatsapp"
        uso: "Casos específicos de mensajería"
        
      - tipo: "timeline"
        descripcion: "Línea de tiempo de eventos"
        argumento: "--timeline 1"
        uso: "Reconstrucción cronológica"
    
    argumentos:
      - "-i: Ruta de imagen o directorio de entrada"
      - "-o: Directorio de salida para reportes"
      - "-t: Tipo de entrada (fs = filesystem)"
      - "--filter: Filtrar módulos específicos"
      - "--timeline: Generar línea de tiempo"
  
  implementacion_electron:
    archivo: "/electron/main.js"
    ipc_handler: "aleapp:start"
    codigo_clave: |
      ipcMain.handle('aleapp:start', async (event, config) => {
        const { imagePath, outputPath, analysisType = 'completo' } = config;
        const args = ['-i', imagePath, '-o', outputPath, '-t', 'fs'];
        if (analysisType === 'whatsapp') args.push('--filter', 'whatsapp');
        if (analysisType === 'timeline') args.push('--timeline', '1');
        const process = spawn('aleapp', args);
        // Manejo de stdout, stderr, y eventos
      });
    
    preload_api: "/electron/preload.js"
    api_expuesta: |
      window.electronAPI.aleapp.start(config)
      window.electronAPI.aleapp.cancel()
      window.electronAPI.aleapp.onOutput(callback)
      window.electronAPI.aleapp.onError(callback)
  
  interfaz_usuario:
    pagina: "AnalisisPage.tsx"
    componentes:
      - "Selector de imagen/directorio de entrada"
      - "Selector de directorio de salida"
      - "Selector de tipo de análisis"
      - "Botón Iniciar/Cancelar análisis"
      - "Barra de progreso en tiempo real"
      - "Log de ejecución en vivo"
      - "Resumen de artefactos procesados"
      
  artefactos_analizados:
    whatsapp:
      - "Mensajes enviados/recibidos"
      - "Contactos de WhatsApp"
      - "Llamadas VoIP"
      - "Archivos multimedia"
      - "Ubicaciones compartidas"
      - "Estados/publicaciones"
      
    sistema:
      - "Llamadas telefónicas"
      - "Contactos del dispositivo"
      - "Mensajes SMS/MMS"
      - "Historial de navegación"
      - "Ubicación GPS"
      - "Aplicaciones instaladas"
      - "Archivos de medios"
      
    formatos_salida:
      - "HTML interactivo (reporte principal)"
      - "CSV/Excel (datos tabulares)"
      - "JSON (datos estructurados)"
      - "Timeline (línea de tiempo)"

# ============================================
# GENERACIÓN DE INFORME TÉCNICO
# ============================================

proceso_informe:
  fase: "FASE IV - Emisión del Dictamen Pericial"
  definicion: "Generación del informe técnico-científico conforme al marco legal"
  
  estructura_dictamen:
    - seccion: "1. Motivo"
      contenido: "Razón por la cual se practica la peritación"
      ejemplo: "Por oficio N° XYZ del Ministerio Público..."
      
    - seccion: "2. Descripción de la Evidencia"
      contenido: "Estado en que se halló y recibió la evidencia"
      datos:
        - "Marca y modelo del dispositivo"
        - "IMEI(s) registrados"
        - "Estado físico observado"
        - "Condiciones de recepción"
        
    - seccion: "3. Exámenes Practicados"
      contenido: "Detalle de softwares, técnicas y valores Hash"
      datos:
        - "Andriller v3.6.2 - Extracción lógica"
        - "ALEAPP v2.1.0 - Análisis de artefactos"
        - "Hash SHA-256 original: <valor>"
        - "Hash SHA-256 copia: <valor>"
        - "Coincidencia de hashes: Sí/No"
        
    - seccion: "4. Resultados"
      contenido: "Tabla con hallazgos del análisis"
      columnas:
        - "Nombre nativo del archivo/artefacto"
        - "Fecha de creación/modificación"
        - "Ruta de ubicación"
        - "Tamaño en bytes"
        - "Hash individual SHA-256"
        - "Relevancia forense"
        
    - seccion: "5. Conclusiones"
      contenido: "Juicio de valor técnico-científico"
      advertencia: "Sin precalificación jurídica"
      caracteristicas:
        - "Objetivas y basadas en hechos"
        - "Responden a objetivos del peritaje"
        - "En lenguaje claro y preciso"
        
    - seccion: "6. Fundamentación Legal"
      contenido: "Base legal del procedimiento"
      leyes:
        - "Constitución Nacional - Debido proceso"
        - "COPP Art. 188 - Resguardo de evidencias"
        - "Ley Especial contra Delitos Informáticos"
        - "Ley de Infogobierno"
        - "Ley sobre Mensajes de Datos y Firmas Electrónicas"
        - "ISO/IEC 27037:2012"
        - "ISO/IEC 27042:2015"
        - "NIST SP 800-101 r1"
        
    - seccion: "7. Consumo de Evidencia"
      contenido: "Constancia de alteración o no de la evidencia"
      opciones:
        - "La evidencia NO fue alterada ni consumida"
        - "Consumo parcial (especificar)"
        
  formalidades:
    - "Presentación por escrito"
    - "Firma del Perito Informático"
    - "Sello del perito"
    - "Versión exacta de herramientas usadas"
    - "Fecha de emisión"
    
  exportacion:
    formatos:
      - "PDF: Formato oficial para presentación"
      - "DOCX: Editable para revisiones"
      - "JSON: Datos estructurados para sistema"
    
  interfaz_usuario:
    pagina: "InformePage.tsx"
    componentes:
      - "Resumen del caso (datos de fases anteriores)"
      - "Formulario de estructura del dictamen"
      - "Checklist de fundamentación legal"
      - "Selector de consumo de evidencia"
      - "Botones de exportación (PDF, DOCX, JSON)"
      - "Vista previa del informe"

# ============================================
# EMPAQUETADO .DEB PARA UBUNTU/DEBIAN
# ============================================

empaquetado_deb:
  herramienta: "Electron Builder"
  version: "24.9.1+"
  
  configuracion_package_json:
    ubicacion: "/package.json"
    scripts:
      - "electron:build: tsc && vite build && electron-builder"
      - "electron:build:deb: tsc && vite build && electron-builder --linux deb"
    
    seccion_build:
      appId: "com.forense.android"
      productName: "Forense Android"
      directories:
        output: "dist-electron"
      files:
        - "dist/**/*"
        - "electron/**/*"
      linux:
        target: ["deb"]
        category: "Utility"
        maintainer: "Laboratorio Forense <forense@ejemplo.gob.ve>"
      deb:
        depends:
          - "python3 (>= 3.11)"
          - "andriller"
          - "aleapp"
  
  proceso_construccion:
    paso_1:
      accion: "Compilar TypeScript"
      comando: "tsc"
      resultado: "Código JavaScript en /dist/"
      
    paso_2:
      accion: "Build de Vite"
      comando: "vite build"
      resultado: "Assets optimizados en /dist/"
      
    paso_3:
      accion: "Empaquetado con Electron Builder"
      comando: "electron-builder --linux deb"
      resultado: "Archivo .deb en /dist-electron/"
      
  comandos_ejecucion:
    desarrollo: "npm run electron:dev"
    produccion_deb: "npm run electron:build:deb"
    
  dependencias_sistema:
    requeridas:
      - "nodejs (>= 18.x)"
      - "npm (>= 9.x)"
      - "python3 (>= 3.11)"
    recomendadas:
      - "andriller"
      - "aleapp"
      
  instalacion_deb:
    comando: "sudo dpkg -i dist-electron/forense-android_1.0.0_amd64.deb"
    dependencias_faltantes: "sudo apt-get install -f"
    
  post_instalacion:
    - "Crear accesos directos en menú de aplicaciones"
    - "Configurar permisos de ejecución"
    - "Verificar disponibilidad de Andriller y ALEAPP"
    - "Inicializar base de datos local"

# ============================================
# MARCO LEGAL VENEZOLANO
# ============================================

marco_legal:
  constitucion:
    - "Art. 49: Debido proceso"
    - "Art. 26: Tutela judicial efectiva"
    - "Art. 48: Privacidad de las comunicaciones"
    
  copp:
    - "Art. 188: Resguardo de evidencias"
    - "Art. 283-289: Régimen de licitud de la prueba"
    - "Obligatoriedad de cadena de custodia"
    
  leyes_especiales:
    - nombre: "Ley Especial contra Delitos Informáticos (2001)"
      descripcion: "Tipifica delitos cibernéticos"
      
    - nombre: "Ley de Infogobierno"
      descripcion: "Validez y seguridad de tecnologías de información"
      
    - nombre: "Ley sobre Mensajes de Datos y Firmas Electrónicas"
      articulos:
        - "Art. 4: Eficacia probatoria de mensajes de datos"
        - "Art. 7: Valor jurídico de la firma electrónica"
        - "Art. 8: Igualdad de eficacia con documento escrito"
        
  estandares_internacionales:
    - "ISO/IEC 27037:2012: Identificación, colección, adquisición y preservación"
    - "ISO/IEC 27042:2015: Análisis e interpretación de pruebas digitales"
    - "NIST SP 800-101 r1: Guía para forensia de dispositivos móviles"

# ============================================
# FLUJO CONTINUO DEL PROCEDIMIENTO
# ============================================

flujo_continuo:
  descripcion: "Proceso integrado desde la consignación hasta el informe final"
  
  etapas:
    - etapa: "1. Consignación"
      pagina: "/consignacion"
      datos_generados:
        - "Caso (número, fiscal, fecha)"
        - "Dispositivo (marca, modelo, IMEI, estado)"
        - "PRCC (número, funcionario, embalaje)"
      salida: "Datos almacenados en Zustand store"
      siguiente: "Adquisición"
      
    - etapa: "2. Adquisición (Andriller)"
      pagina: "/adquisicion"
      datos_entrada: "Información del dispositivo desde consignación"
      proceso:
        - "Selección de directorio de salida"
        - "Configuración de tipo de extracción"
        - "Ejecución de Andriller vía IPC"
        - "Monitoreo en tiempo real"
        - "Cálculo de hashes"
      datos_generados:
        - "Ruta de imagen forense"
        - "Tipo de extracción realizada"
        - "Logs de ejecución"
        - "Hashes SHA-256 y MD5"
      salida: "Adquisición almacenada en store"
      siguiente: "Análisis"
      
    - etapa: "3. Análisis (ALEAPP)"
      pagina: "/analisis"
      datos_entrada: "Ruta de imagen desde adquisición"
      proceso:
        - "Selección de tipo de análisis"
        - "Ejecución de ALEAPP vía IPC"
        - "Procesamiento de artefactos"
        - "Generación de reportes"
      datos_generados:
        - "Reporte HTML interactivo"
        - "Datos estructurados (JSON/CSV)"
        - "Timeline de eventos"
        - "Lista de artefactos encontrados"
      salida: "Resultados almacenados en store"
      siguiente: "Informe Técnico"
      
    - etapa: "4. Informe Técnico"
      pagina: "/informe"
      datos_entrada: "Toda la información de etapas anteriores"
      proceso:
        - "Redacción de motivo y descripción"
        - "Documentación de exámenes practicados"
        - "Tabulación de resultados"
        - "Formulación de conclusiones"
        - "Selección de fundamentación legal"
      datos_generados:
        - "Dictamen Pericial completo"
        - "Archivos exportables (PDF, DOCX, JSON)"
      salida: "Informe final listo para presentación"
      siguiente: "Cierre del caso"
  
  trazabilidad:
    descripcion: "Cada etapa registra información para auditoría"
    registros:
      - "Timestamp de cada acción"
      - "Usuario que realizó la operación"
      - "Hash del registro anterior (cadena inmutable)"
      - "Metadatos de la operación"
    implementacion: "audit_log en base de datos (pendiente)"

# ============================================
# COMANDOS DE INSTALACIÓN Y DESARROLLO
# ============================================

instalacion_desarrollo:
  prerequisitos:
    - "Node.js >= 18.x"
    - "npm >= 9.x"
    - "Python >= 3.11"
    - "Andriller instalado en el sistema"
    - "ALEAPP instalado en el sistema"
    
  pasos:
    - orden: 1
      accion: "Navegar al directorio del proyecto"
      comando: "cd /workspace/forense-android-electron"
      
    - orden: 2
      accion: "Instalar dependencias de npm"
      comando: "npm install"
      
    - orden: 3
      accion: "Verificar instalación de herramientas externas"
      comandos:
        - "andriller --version"
        - "aleapp --version"
        
    - orden: 4
      accion: "Iniciar en modo desarrollo"
      comando: "npm run electron:dev"
      
  construccion_paquete:
    - orden: 1
      accion: "Compilar para producción"
      comando: "npm run electron:build:deb"
      
    - orden: 2
      accion: "Localizar paquete .deb"
      ubicacion: "/dist-electron/forense-android_1.0.0_amd64.deb"
      
    - orden: 3
      accion: "Instalar paquete"
      comando: "sudo dpkg -i dist-electron/forense-android_1.0.0_amd64.deb"
      
    - orden: 4
      accion: "Resolver dependencias si faltan"
      comando: "sudo apt-get install -f"

