fase_disposicion_judicial:
  nombre: "Fase de Disposición Judicial"
  definicion: "Momento en que la evidencia pasa a disposición del Poder Judicial tras admitirse la acusación."
  
  actividades:
    - nombre: "Resguardo Judicial"
      descripcion: "Custodia en áreas especializadas del Poder Judicial."
      
    - nombre: "Exhibición en Audiencia"
      descripcion: "Traslado y transferencia para valoración en juicio."
      documento: "Acta de Exhibición de Evidencias"
      
  responsables:
    - "Juez"
    - "Fiscal"
    - "Perito Informático (Exposición)"
    - "Secretario de Sala"
