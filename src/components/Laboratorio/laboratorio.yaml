fase_laboratorio:
  nombre: "Fase de Laboratorio - Peritación"
  definicion: "Fase intermedia destinada a la peritación de evidencias mediante técnicas técnico-científicas."
  
  procedimientos:
    - nombre: "Recepción"
      actividades: ["Verificar precintos", "Cotejar PRCC", "Recalcular Hash"]
      
    - nombre: "Peritaje"
      etapas:
        - "Valoración: Apreciar contexto"
        - "Descripción: Detallar estado de hallazgo"
        - "Análisis: Aplicar Andriller/ALEAPP"
        - "Interpretación: Evaluar resultados"
        - "Conclusión: Juicio de valor técnico"
        
    - nombre: "Dictamen Pericial"
      estructura:
        - "1. Motivo"
        - "2. Descripción"
        - "3. Exámenes Practicados"
        - "4. Resultados"
        - "5. Conclusiones"
        - "6. Fundamentación Legal"
        - "7. Consumo de Evidencia"

  herramientas:
    - "Andriller v3.6.2 (Extracción)"
    - "ALEAPP v2.1.0 (Análisis)"
    
  estandares:
    - "ISO/IEC 27042:2015"
