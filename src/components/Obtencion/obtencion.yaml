fase_inicial:
  nombre: "Fase Inicial - Obtención"
  definicion: "Fase génesis del sistema, integradora de la evidencia física a la cadena de custodia."
  
  formas_obtencion:
    - tipo: "OBTENCIÓN TÉCNICA"
      prioridad: 1
      definicion: "Personal especializado acude al sitio del suceso mediante trabajo de campo."
      procedimientos:
        - "Protección Técnica: Aislamiento y preservación"
        - "Observación Preliminar: Planificación del abordaje"
        - "Fijación: Fotográfica, Escrita, Planimétrica"
        - "Colección: Levantamiento manual o instrumental"
        - "Embalaje y Rotulación: Sellado inviolable"
        - "Registro en PRCC: Documentación legal"
        
    - tipo: "OBTENCIÓN POR ASEGURAMIENTO"
      prioridad: 2
      definicion: "Asegurar evidencias en poder de terceros mediante procedimientos legales (allanamientos, decomisos)."
      procedimientos:
        - "Búsqueda: Localización sistemática"
        - "Posesión: Toma de control legal"
        
    - tipo: "OBTENCIÓN POR CONSIGNACIÓN"
      prioridad: 3
      definicion: "Entrega voluntaria de la evidencia por el propietario o poseedor."
      procedimientos:
        - "Recepción: Verificación de identidad y motivo"
        - "Fijación Técnica: Registro de IMEI, estado físico y pantalla"
        
    - tipo: "OBTENCIÓN POR DERIVACIÓN"
      prioridad: 4
      definicion: "Nueva evidencia obtenida del análisis de una principal (separación, segmentación, selección)."

  estandares:
    - "ISO/IEC 27037:2012"
    - "Manual Único de Cadena de Custodia 2017"
