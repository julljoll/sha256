planilla_prcc:
  definicion: "Planilla de Registro de Cadena de Custodia (PRCC). Documento legal que garantiza la trazabilidad."
  
  campos_obligatorios:
    encabezado:
      - "Número de Actuación/NRO de Caso"
      - "Fecha y Hora de Inicio"
      - "Lugar de los Hechos"
      - "Naturaleza del Hecho"
      - "Organismo Remitente"
      
    funcionario_actuante:
      - "Nombre y Apellido"
      - "Cédula de Identidad"
      - "Cargo"
      
    tabla_evidencias:
      - "N° Correlativo"
      - "Descripción Detallada"
      - "Cantidad"
      - "Características (Marca, Modelo, Serie)"
      - "Tipo de Embalaje"
      - "Sello/Precinto"
      
    transferencia:
      - "Motivo del Traspaso"
      - "Datos del que Entrega"
      - "Datos del que Recibe"
      - "Observaciones (Integridad de sellos)"

  criterios:
    - "Auditabilidad"
    - "Continuidad"
    - "Integridad"
    - "Sustentabilidad"
